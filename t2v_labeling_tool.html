  * { box-sizing: border-box; }
  body {

    font-size: 15px; line-height: 1.5;
  }
  header.topbar {
    position: sticky; top: 0; z-index: 10;
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .topbar .pair { font-weight: 600; white-space: nowrap; }
  .topbar .spacer { flex: 1; }
  .progress-wrap { flex: 1 1 220px; min-width: 160px; }
  .progress-bar { height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ok); width: 0%; transition: width .2s; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  main { max-width: 980px; margin: 18px auto; padding: 0 16px 80px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .card-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .prompt { white-space: pre-wrap; }
  .videos-row { display: flex; gap: 16px; }
  .videos-row .card { flex: 1; margin-bottom: 16px; }
  video { width: 100%; border-radius: 8px; background: #000; display: block; }
  .badge { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .badge.ok { background: #dcfce7; color: var(--ok); }
  .warn {
    background: var(--warn-bg); border: 1px solid var(--warn-bd); color: #9a3412;
    border-radius: 10px; padding: 14px 16px; font-weight: 500;
  }
  .breadcrumb { display: flex; gap: 10px; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .breadcrumb .cur { color: var(--primary); font-weight: 700; }
  .intro h-, .intro p { margin: 8px 0; }
  .intro ul, .intro ol { margin: 8px 0; padding-left: 22px; }
  .intro li { margin: 4px 0; }
  .q-desc { font-weight: 500; margin-bottom: 10px; }
  .hint {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; background: #e5e7eb; color: var(--muted);
    font-size: 12px; cursor: help; margin-left: 6px;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice {
    text-align: left; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: #fff; cursor: pointer; font-size: 15px; transition: all .12s;
  }
  .choice:hover { border-color: #c7ccd3; }
  .choice.sel { border-color: var(--primary); background: var(--sel-bg); font-weight: 600; }
  .recap { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .recap table { border-collapse: collapse; width: 100%; }
  .recap td { padding: 3px 6px; border-bottom: 1px solid #f0f1f3; }
  .recap td:last-child { text-align: right; font-weight: 600; color: var(--text); }
  textarea {
    width: 100%; min-height: 110px; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 15px; resize: vertical;
  }
  .char-count { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .char-count.bad { color: #b91c1c; }
  .nav { display: flex; gap: 10px; margin-top: 4px; }
  button {
    font-family: inherit; font-size: 14px; padding: 8px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; cursor: pointer;
  }
  button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  button.primary:hover { background: var(--primary-d); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost { background: #fff; }
  .pill { font-size: 12px; padding: 2px 10px; border-radius: 99px; background: #eef2ff; color: var(--primary); }
  .pill.done { background: #dcfce7; color: var(--ok); }
</style>
</head>

const STORAGE_KEY = 't2v_labeling_v1';

const CHOICES = [
  { value: 'a',   label: '🅰️ Video A is better' },
  { value: 'tie', label: '🟰 Tie / Equal' },
  { value: 'b',   label: '🅱️ Video B is better' }
];
const SHORT = { a: 'Video A', tie: 'Tie', b: 'Video B' };
const BLOCKS = ['Video Quality', 'Text Alignment', 'Overall'];
const MIN_COMMENT = 30;

const STEPS = [

      <p>You'll now compare the two videos on <strong>visual quality</strong> — how they look and move, <em>not</em> whether they match the description yet. The next <strong>4 questions</strong> all cover this.</p>

const QUESTIONS = STEPS.filter(s => s.type === 'question');
const QPATHS = QUESTIONS.map(s => s.path);
const COMMENT_STEP = STEPS.length; // wizard index of the comment screen

/* ---------- state + persistence ---------- */
function freshState() {
  return BATCH.map(() => ({ answers: {}, comment: '', watchedA: false, watchedB: false, si: 0 }));
}
function loadAll() {
  try {
    const o = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (o && Array.isArray(o.state) && o.state.length === BATCH.length) return o;
  } catch (e) {}
  return null;
}
const saved = loadAll();
let state = saved ? saved.state : freshState();
let di = saved ? (saved.di || 0) : 0;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ state, di })); }
function isComplete(i) {
  const s = state[i];
  return QPATHS.every(p => s.answers[p]) && (s.comment || '').length >= MIN_COMMENT;
}
function completedCount() { return state.reduce((n, _, i) => n + (isComplete(i) ? 1 : 0), 0); }
function escapeHtml(t) {
  return String(t).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ---------- DOM refs ---------- */
const videosEl = document.getElementById('videos');
const wizardEl = document.getElementById('wizard');

/* ---------- top bar ---------- */
function updateTopbar() {
  document.getElementById('pairLabel').textContent = `Pair ${di + 1} / ${BATCH.length}`;
  document.getElementById('prevPair').disabled = di === 0;
  document.getElementById('nextPair').disabled = di === BATCH.length - 1;
  const done = isComplete(di);
  const statusEl = document.getElementById('pairStatus');
  statusEl.textContent = done ? '✓ complete' : 'in progress';
  statusEl.className = 'pill' + (done ? ' done' : '');
  const total = completedCount();
  document.getElementById('progFill').style.width = (100 * total / BATCH.length) + '%';
  document.getElementById('progLabel').textContent = `${total} / ${BATCH.length} complete`;
}

/* ---------- videos (built once per datapoint) ---------- */
function buildVideos() {
  const b = BATCH[di], s = state[di];
  videosEl.innerHTML = `
    <div class="card">
      <div class="card-title">Video description</div>
      <div class="prompt">${escapeHtml(b.prompt)}</div>
    </div>
    <div class="videos-row">
      <div class="card">
        <div class="card-title">🅰️ Video A <span class="badge ok" id="badgeA" style="display:${s.watchedA ? 'inline-block' : 'none'}">✓ watched</span></div>
        <video id="vidA" src="${encodeURI(b.video_a)}" controls preload="metadata"></video>
      </div>
      <div class="card">
        <div class="card-title">🅱️ Video B <span class="badge ok" id="badgeB" style="display:${s.watchedB ? 'inline-block' : 'none'}">✓ watched</span></div>
        <video id="vidB" src="${encodeURI(b.video_b)}" controls preload="metadata"></video>
      </div>
    </div>`;
  document.getElementById('vidA').addEventListener('ended', () => markWatched('A'));
  document.getElementById('vidB').addEventListener('ended', () => markWatched('B'));
}
function markWatched(which) {
  const s = state[di];
  if (which === 'A') s.watchedA = true; else s.watchedB = true;
  save();
  const badge = document.getElementById('badge' + which);
  if (badge) badge.style.display = 'inline-block';
  buildWizard();
  updateTopbar();
}

/* ---------- wizard (re-built on step / answer change) ---------- */
function buildWizard() {
  const s = state[di];
  if (!(s.watchedA && s.watchedB)) {
    wizardEl.innerHTML = `<div class="warn">▶ Watch both videos to the end to unlock the questions. You only need to do this once — replays afterward are fine.</div>`;
    return;
  }
  const si = s.si || 0;
  const curBlock = si < STEPS.length ? STEPS[si].block : 'Overall';
  let html = `<div class="breadcrumb">${BLOCKS.map((b, i) =>
    `<span class="${b === curBlock ? 'cur' : ''}">${i > 0 ? '→ ' : ''}${b}</span>`).join('')}</div>`;

  if (si < STEPS.length) {
    const step = STEPS[si];
    if (step.type === 'intro') {
      html += `<div class="card"><div class="card-title">${step.title}</div><div class="intro">${step.html}</div></div>`;
    } else {
      const val = s.answers[step.path] || '';
      html += `<div class="card">
        <div class="card-title">${step.title} <span style="color:var(--muted);font-weight:400">(${step.counter})</span></div>
        <div class="q-desc">${escapeHtml(step.description)}<span class="hint" title="Example: ${escapeHtml(step.example)}">?</span></div>
        <div class="choices">
          ${CHOICES.map(c => `<button class="choice ${val === c.value ? 'sel' : ''}" data-val="${c.value}">${c.label}</button>`).join('')}
        </div>
      </div>`;
    }
  } else {
    // comment step
    html += `<div class="card">
      <div class="card-title">Justification</div>
      <div class="q-desc">Why did you make these choices? Describe the reasoning that justifies your selection.</div>
      <textarea id="commentBox" placeholder="e.g. Video A follows the description more closely and has sharper detail, while Video B shows flickering in the background.">${escapeHtml(s.comment || '')}</textarea>
      <div class="char-count ${(s.comment || '').length < MIN_COMMENT ? 'bad' : ''}" id="charCount"></div>
      <div class="recap"><table>${QUESTIONS.map(q =>
        `<tr><td>${q.title}</td><td>${s.answers[q.path] ? SHORT[s.answers[q.path]] : '—'}</td></tr>`).join('')}</table></div>
    </div>`;
  }

  // navigation
  const nextDisabled = si < STEPS.length && STEPS[si].type === 'question' && !s.answers[STEPS[si].path];
  html += `<div class="nav">
    <button id="backBtn" ${si === 0 ? 'disabled' : ''}>← Back</button>
    ${si < STEPS.length
      ? `<button class="primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next →</button>`
      : `<button class="primary" id="nextPairBtn" ${(!isComplete(di) || di === BATCH.length - 1) ? 'disabled' : ''}>Save &amp; next pair →</button>`}
  </div>`;

  wizardEl.innerHTML = html;

  // wire up
  wizardEl.querySelectorAll('.choice').forEach(btn =>
    btn.addEventListener('click', () => chooseAnswer(STEPS[si].path, btn.dataset.val)));
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', () => setStep(si - 1));
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.addEventListener('click', () => setStep(si + 1));
  const nextPairBtn = document.getElementById('nextPairBtn');
  if (nextPairBtn) nextPairBtn.addEventListener('click', () => goToDatapoint(di + 1));

  const box = document.getElementById('commentBox');
  if (box) {
    const updateCount = () => {
      const len = box.value.length;
      const cc = document.getElementById('charCount');
      cc.textContent = `${len} / ${MIN_COMMENT} characters minimum`;
      cc.className = 'char-count' + (len < MIN_COMMENT ? ' bad' : '');
      const npb = document.getElementById('nextPairBtn');
      if (npb) npb.disabled = !isComplete(di) || di === BATCH.length - 1;
    };
    box.addEventListener('input', () => {
      state[di].comment = box.value;
      save();
      updateCount();
      updateTopbar();
    });
    updateCount();
  }
}
function chooseAnswer(path, val) {
  state[di].answers[path] = val;
  save();
  buildWizard();
  updateTopbar();
}
function setStep(si) {
  state[di].si = Math.max(0, Math.min(COMMENT_STEP, si));
  save();
  buildWizard();
}
function goToDatapoint(i) {
  di = Math.max(0, Math.min(BATCH.length - 1, i));
  save();
  buildVideos();
  buildWizard();
  updateTopbar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ---------- export / reset ---------- */
function download() {
  const out = BATCH.map((b, i) => {
    const s = state[i];
    return {
      index: i,
      prompt: b.prompt,
      video_a: b.video_a,
      video_b: b.video_b,
      image_quality: s.answers.image_quality || null,
      motion_quality: s.answers.motion_quality || null,
      subject_background_consistency: s.answers.subject_background_consistency || null,
      video_realism: s.answers.video_realism || null,
      image_text_alignment: s.answers.image_text_alignment || null,
      motion_text_alignment: s.answers.motion_text_alignment || null,
      overall_preference: s.answers.overall_preference || null,
      comment: s.comment || '',
      completed: isComplete(i)
    };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 't2v_results.json'; a.click();
  URL.revokeObjectURL(url);
}
function resetAll() {
  if (!confirm('Clear ALL saved answers for all 50 pairs? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = freshState(); di = 0;
  buildVideos(); buildWizard(); updateTopbar();
}

document.getElementById('prevPair').addEventListener('click', () => goToDatapoint(di - 1));
document.getElementById('nextPair').addEventListener('click', () => goToDatapoint(di + 1));
document.getElementById('downloadBtn').addEventListener('click', download);
document.getElementById('resetBtn').addEventListener('click', resetAll);

/* ---------- init ---------- */
buildVideos();
buildWizard();
updateTopbar();
</script>
